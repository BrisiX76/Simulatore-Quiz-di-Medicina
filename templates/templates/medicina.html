<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Test di Medicina</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
  <div class="bg-canvas">
    <svg viewBox="0 0 1440 900" preserveAspectRatio="xMidYMid slice" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <radialGradient id="glow1" cx="50%" cy="50%" r="50%"><stop offset="0%" stop-color="#1a3a6e" stop-opacity="0.7"/><stop offset="100%" stop-color="#0a0f1e" stop-opacity="0"/></radialGradient>
        <radialGradient id="glow2" cx="50%" cy="50%" r="50%"><stop offset="0%" stop-color="#c8a96e" stop-opacity="0.25"/><stop offset="100%" stop-color="#0a0f1e" stop-opacity="0"/></radialGradient>
      </defs>
      <ellipse cx="200" cy="200" rx="400" ry="350" fill="url(#glow1)"/>
      <ellipse cx="1200" cy="700" rx="380" ry="300" fill="url(#glow1)"/>
      <ellipse cx="900" cy="150" rx="300" ry="250" fill="url(#glow2)"/>
      <g class="bg-el-1" fill="none" stroke="#c8a96e" stroke-width="0.8" opacity="0.35"><rect x="60" y="200" width="28" height="480" rx="2"/><rect x="55" y="190" width="38" height="18" rx="1"/><line x1="68" y1="210" x2="68" y2="668"/><line x1="74" y1="210" x2="74" y2="668"/><line x1="80" y1="210" x2="80" y2="668"/></g>
      <g class="bg-el-3" fill="none" stroke="#c8a96e" stroke-width="0.8" opacity="0.28"><rect x="1350" y="180" width="28" height="500" rx="2"/><line x1="1358" y1="190" x2="1358" y2="670"/><line x1="1364" y1="190" x2="1364" y2="670"/></g>
      <g class="bg-el-2" fill="none" stroke="#8aafdf" stroke-width="0.7" opacity="0.35"><path d="M 180 350 Q 220 370 180 390 Q 140 410 180 430 Q 220 450 180 470 Q 140 490 180 510 Q 220 530 180 550"/><path d="M 200 350 Q 160 370 200 390 Q 240 410 200 430 Q 160 450 200 470 Q 240 490 200 510 Q 160 530 200 550"/></g>
      <g class="bg-el-1" opacity="0.25" font-family="Georgia, serif" fill="#c8a96e"><text x="80" y="160" font-size="13">F = ma</text><text x="1300" y="280" font-size="11">E = hν</text><text x="70" y="750" font-size="11">λ = v/f</text></g>
      <g class="bg-el-3" opacity="0.22" font-family="Georgia, serif" fill="#8aafdf"><text x="100" y="580" font-size="10">2n = 46</text><text x="1310" y="160" font-size="11">ATP → ADP</text></g>
    </svg>
  </div>

  <div class="page-wrapper">
    <header class="app-header">
      <div class="badge">Simulatore Ufficiale</div>
      <h1>Test di <span>Medicina</span></h1>
      <p>Allenati con domande selezionate in stile<br>semestre filtro — per arrivare preparato.</p>
    </header>

    <div class="card">
      <form action="/start" method="post">
        <div class="form-group">
          <label for="materia">Materia</label>
          <select id="materia" name="materia">
            <option value="biologia">🧬 Biologia</option>
            <option value="chimica">⚗️ Chimica</option>
            <option value="fisica">⚡ Fisica</option>
          </select>
        </div>
        <div class="form-group">
          <label for="livello">Livello di difficoltà</label>
          <select id="livello" name="livello">
            <option value="medio">Medio — Fondamentali</option>
            <option value="difficile">Difficile — Avanzato</option>
          </select>
        </div>
        <div class="form-group">
          <label for="n_domande">Numero di domande</label>
          <select id="n_domande" name="n_domande">
            <option value="5">5 — Test breve</option>
            <option value="10" selected>10 — Test standard</option>
            <option value="15">15 — Test completo</option>
          </select>
        </div>

        <div class="divider"></div>
        <button type="submit" class="btn-primary">Inizia il Test →</button>
      </form>
      <div class="divider"></div>
      <a href="/statistiche" style="text-decoration:none;">
        <button class="btn-secondary">Le tue statistiche →</button>
      </a>
    </div>

    <div class="stats-row">
      <div class="stat-box"><span class="stat-num">90+</span><span class="stat-label">Domande</span></div>
      <div class="stat-box"><span class="stat-num">3</span><span class="stat-label">Materie</span></div>
      <div class="stat-box"><span class="stat-num">2</span><span class="stat-label">Livelli</span></div>
    </div>

    <div style="text-align:center; margin-top:1.5rem;">
      <a href="/" style="color:var(--muted); text-decoration:none; font-size:0.82rem;">← Torna alla home</a>
    </div>

    <footer class="app-footer">Simulatore non ufficiale · uso didattico</footer>
  </div>
</body>
</html>
