<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Simulatore Test Medicina</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

  <!-- Sfondo accademico-scientifico -->
  <div class="bg-canvas">
    <svg viewBox="0 0 1440 900" preserveAspectRatio="xMidYMid slice" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <radialGradient id="glow1" cx="50%" cy="50%" r="50%">
          <stop offset="0%" stop-color="#1a3a6e" stop-opacity="0.7"/>
          <stop offset="100%" stop-color="#0a0f1e" stop-opacity="0"/>
        </radialGradient>
        <radialGradient id="glow2" cx="50%" cy="50%" r="50%">
          <stop offset="0%" stop-color="#c8a96e" stop-opacity="0.45"/>
          <stop offset="100%" stop-color="#0a0f1e" stop-opacity="0"/>
        </radialGradient>
      </defs>

      <!-- Glow di sfondo -->
      <ellipse cx="200" cy="200" rx="400" ry="350" fill="url(#glow1)"/>
      <ellipse cx="1200" cy="700" rx="380" ry="300" fill="url(#glow1)"/>
      <ellipse cx="900" cy="150" rx="300" ry="250" fill="url(#glow2)"/>

      <!-- Colonne classiche sx -->
      <g class="bg-el-1" fill="none" stroke="#c8a96e" stroke-width="0.8" opacity="0.35">
        <rect x="60" y="200" width="28" height="480" rx="2"/>
        <rect x="55" y="190" width="38" height="18" rx="1"/>
        <rect x="50" y="672" width="48" height="12" rx="1"/>
        <rect x="48" y="684" width="52" height="8" rx="1"/>
        <!-- Scanalature colonna -->
        <line x1="68" y1="210" x2="68" y2="668"/>
        <line x1="74" y1="210" x2="74" y2="668"/>
        <line x1="80" y1="210" x2="80" y2="668"/>
      </g>
      <g class="bg-el-2" fill="none" stroke="#c8a96e" stroke-width="0.8" opacity="0.28">
        <rect x="110" y="280" width="24" height="400" rx="2"/>
        <rect x="106" y="272" width="32" height="14" rx="1"/>
        <rect x="103" y="674" width="38" height="10" rx="1"/>
        <line x1="118" y1="288" x2="118" y2="672"/>
        <line x1="124" y1="288" x2="124" y2="672"/>
      </g>

      <!-- Colonne classiche dx -->
      <g class="bg-el-3" fill="none" stroke="#c8a96e" stroke-width="0.8" opacity="0.28">
        <rect x="1350" y="180" width="28" height="500" rx="2"/>
        <rect x="1345" y="170" width="38" height="18" rx="1"/>
        <rect x="1342" y="672" width="48" height="12" rx="1"/>
        <line x1="1358" y1="190" x2="1358" y2="670"/>
        <line x1="1364" y1="190" x2="1364" y2="670"/>
        <line x1="1370" y1="190" x2="1370" y2="670"/>
      </g>

      <!-- Arco classico in alto -->
      <g class="bg-el-4" fill="none" stroke="#8aafdf" stroke-width="0.7" opacity="0.28">
        <path d="M 580 0 Q 720 120 860 0"/>
        <path d="M 560 0 Q 720 140 880 0"/>
        <line x1="580" y1="0" x2="580" y2="80"/>
        <line x1="860" y1="0" x2="860" y2="80"/>
      </g>

      <!-- Molecola DNA sx -->
      <g class="bg-el-2" fill="none" stroke="#8aafdf" stroke-width="0.7" opacity="0.35">
        <path d="M 180 350 Q 220 370 180 390 Q 140 410 180 430 Q 220 450 180 470 Q 140 490 180 510 Q 220 530 180 550"/>
        <path d="M 200 350 Q 160 370 200 390 Q 240 410 200 430 Q 160 450 200 470 Q 240 490 200 510 Q 160 530 200 550"/>
        <line x1="185" y1="368" x2="195" y2="372"/>
        <line x1="183" y1="408" x2="197" y2="412"/>
        <line x1="185" y1="448" x2="195" y2="452"/>
        <line x1="183" y1="488" x2="197" y2="492"/>
        <line x1="185" y1="528" x2="195" y2="532"/>
      </g>

      <!-- Molecola DNA dx -->
      <g class="bg-el-5" fill="none" stroke="#8aafdf" stroke-width="0.7" opacity="0.28">
        <path d="M 1260 400 Q 1300 420 1260 440 Q 1220 460 1260 480 Q 1300 500 1260 520 Q 1220 540 1260 560"/>
        <path d="M 1280 400 Q 1240 420 1280 440 Q 1320 460 1280 480 Q 1240 500 1280 520 Q 1320 540 1280 560"/>
        <line x1="1265" y1="418" x2="1275" y2="422"/>
        <line x1="1263" y1="458" x2="1277" y2="462"/>
        <line x1="1265" y1="498" x2="1275" y2="502"/>
        <line x1="1263" y1="538" x2="1277" y2="542"/>
      </g>

      <!-- Formule scientifiche -->
      <g class="bg-el-1" opacity="0.25" font-family="Georgia, serif" fill="#c8a96e">
        <text x="80" y="160" font-size="13">F = ma</text>
        <text x="1300" y="280" font-size="11">E = hν</text>
        <text x="1320" y="350" font-size="10">PV = nRT</text>
        <text x="70" y="750" font-size="11">λ = v/f</text>
        <text x="1290" y="800" font-size="12">pH = -log[H⁺]</text>
      </g>
      <g class="bg-el-3" opacity="0.22" font-family="Georgia, serif" fill="#8aafdf">
        <text x="100" y="580" font-size="10">2n = 46</text>
        <text x="1310" y="160" font-size="11">ATP → ADP</text>
        <text x="1280" y="600" font-size="10">C = ε₀A/d</text>
        <text x="85" y="480" font-size="11">I = V/R</text>
      </g>

      <!-- Stelle / punti luce -->
      <g opacity="0.45" fill="#c8a96e">
        <circle cx="400" cy="80" r="1.2"/>
        <circle cx="1100" cy="120" r="1"/>
        <circle cx="250" cy="600" r="1.5"/>
        <circle cx="1350" cy="500" r="1"/>
        <circle cx="700" cy="820" r="1.2"/>
        <circle cx="950" cy="50" r="1"/>
        <circle cx="150" cy="300" r="0.8"/>
        <circle cx="1400" cy="350" r="1.3"/>
      </g>

      <!-- Linea orizzontale classica in basso -->
      <g class="bg-el-4" stroke="#c8a96e" stroke-width="0.5" opacity="0.35">
        <line x1="0" y1="860" x2="1440" y2="860"/>
        <line x1="0" y1="855" x2="1440" y2="855"/>
        <line x1="100" y1="848" x2="1340" y2="848"/>
      </g>
    </svg>
  </div>

  <div class="page-wrapper">

    <header class="app-header">
      <div class="badge">Simulatore Ufficiale</div>
      <h1>Test di <span>Medicina</span></h1>
      <p>Allenati con domande selezionate in stile<br>semestre filtro — per arrivare preparato.</p>
    </header>

    <div class="card">
      <form action="/start" method="post">

        <div class="form-group">
          <label for="materia">Materia</label>
          <select id="materia" name="materia">
            <option value="biologia">🧬 Biologia</option>
            <option value="chimica">⚗️ Chimica</option>
            <option value="fisica">⚡ Fisica</option>
            <option value="gruppo">🍷 FantaLeggenda</option>
          </select>
        </div>

        <div class="form-group">
          <label for="livello">Livello di difficoltà</label>
          <select id="livello" name="livello">
            <option value="medio">Medio — Fondamentali</option>
            <option value="difficile">Difficile — Avanzato</option>
          </select>
        </div>

        <div class="divider"></div>

        <button type="submit" class="btn-primary">Inizia il Test →</button>

      </form>

      <div class="divider"></div>

      <a href="/statistiche" style="text-decoration:none;">
        <button class="btn-secondary">Le tue statistiche →</button>
      </a>

    </div>

    <div class="stats-row">
      <div class="stat-box">
        <span class="stat-num">110+</span>
        <span class="stat-label">Domande</span>
      </div>
      <div class="stat-box">
        <span class="stat-num">3</span>
        <span class="stat-label">Materie</span>
      </div>
      <div class="stat-box">
        <span class="stat-num">2</span>
        <span class="stat-label">Livelli</span>
      </div>
    </div>

    <footer class="app-footer">Simulatore non ufficiale · uso didattico</footer>

  </div>
</body>
</html>
